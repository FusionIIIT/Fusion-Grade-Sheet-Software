appId: in.ac.iiitdmj.fusiongradesheet
productName: Fusion Grade Sheet
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  - resources/**
mac:
  category: public.app-category.education
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: resources/icon.png
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
  category: Education
  icon: resources/icon.png
publish:
  provider: github
  owner: FusionIIIT
  repo: Fusion-Grade-Sheet-Software
  releaseType: release
